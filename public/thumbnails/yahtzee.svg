<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(42,42,61,0.4)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="#0A0A0F"/>
  <rect width="320" height="180" fill="url(#grid)"/>

  <!-- Die 1: showing 2 -->
  <g transform="translate(28,56)">
    <rect width="46" height="46" rx="8" fill="linear-gradient(145deg,#fffef8,#f0ead8)" stroke="#ccc0a0" stroke-width="1.5"/>
    <rect width="46" height="46" rx="8" fill="#f0ece0"/>
    <circle cx="14" cy="14" r="5" fill="#1a1a2e"/>
    <circle cx="32" cy="32" r="5" fill="#1a1a2e"/>
  </g>

  <!-- Die 2: showing 4 -->
  <g transform="translate(82,56)">
    <rect width="46" height="46" rx="8" fill="#f0ece0" stroke="#ccc0a0" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="5" fill="#1a1a2e"/>
    <circle cx="32" cy="14" r="5" fill="#1a1a2e"/>
    <circle cx="14" cy="32" r="5" fill="#1a1a2e"/>
    <circle cx="32" cy="32" r="5" fill="#1a1a2e"/>
  </g>

  <!-- Die 3: showing 6 (HELD — cyan glow) -->
  <g transform="translate(136,50)">
    <!-- glow ring -->
    <rect width="58" height="58" rx="10" fill="none" stroke="rgba(0,245,255,0.35)" stroke-width="6"/>
    <!-- die face -->
    <rect width="58" height="58" rx="9" fill="#d8f8ff" stroke="#00F5FF" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="43" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="43" r="5.5" fill="#1a1a2e"/>
    <!-- HELD label -->
    <text x="29" y="74" font-family="'Courier New',monospace" font-size="7" fill="#00F5FF" text-anchor="middle" letter-spacing="1">HELD</text>
  </g>

  <!-- Die 4: showing 6 (HELD — cyan glow) -->
  <g transform="translate(202,50)">
    <rect width="58" height="58" rx="10" fill="none" stroke="rgba(0,245,255,0.35)" stroke-width="6"/>
    <rect width="58" height="58" rx="9" fill="#d8f8ff" stroke="#00F5FF" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="43" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="43" r="5.5" fill="#1a1a2e"/>
    <text x="29" y="74" font-family="'Courier New',monospace" font-size="7" fill="#00F5FF" text-anchor="middle" letter-spacing="1">HELD</text>
  </g>

  <!-- Die 5: showing 6 (HELD — cyan glow) -->
  <g transform="translate(266,50)">
    <rect width="58" height="58" rx="10" fill="none" stroke="rgba(0,245,255,0.35)" stroke-width="6"/>
    <rect width="58" height="58" rx="9" fill="#d8f8ff" stroke="#00F5FF" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="15" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="29" r="5.5" fill="#1a1a2e"/>
    <circle cx="15" cy="43" r="5.5" fill="#1a1a2e"/>
    <circle cx="29" cy="43" r="5.5" fill="#1a1a2e"/>
    <text x="29" y="74" font-family="'Courier New',monospace" font-size="7" fill="#00F5FF" text-anchor="middle" letter-spacing="1">HELD</text>
  </g>

  <!-- Score hint -->
  <text x="160" y="165" font-family="'Courier New', monospace" font-size="9" fill="#00F5FF" text-anchor="middle" font-weight="bold" letter-spacing="2">YAHTZEE!</text>
  <text x="160" y="176" font-family="'Courier New', monospace" font-size="6.5" fill="#505070" text-anchor="middle" letter-spacing="1">13 ROUNDS  ·  CLASSIC DICE</text>
